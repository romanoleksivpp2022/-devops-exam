name: Task3 - Deploy Application

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev, release, both)'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - dev
          - release

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  APP_REPO: https://github.com/YulianSalo/devops-exam-pt2.git
  DEV_BRANCH: develop
  RELEASE_TAG: "1.0.0"
  DEV_PORT: 8002
  RELEASE_PORT: 8003
  DEV_IMAGE: ${{ secrets.DOCKER_USERNAME }}/devops-exam-app:develop
  RELEASE_IMAGE: ${{ secrets.DOCKER_USERNAME }}/devops-exam-app:1.0.0

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Push Docker images
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    outputs:
      dev_image: ${{ steps.set-outputs.outputs.dev_image }}
      release_image: ${{ steps.set-outputs.outputs.release_image }}

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Build DEV image (branch: develop) ──
      - name: Checkout app repo (develop branch)
        if: ${{ github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'both' }}
        uses: actions/checkout@v4
        with:
          repository: YulianSalo/devops-exam-pt2
          ref: develop
          path: app-dev

      - name: Build & push DEV image
        if: ${{ github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'both' }}
        uses: docker/build-push-action@v5
        with:
          context: ./app-dev
          push: true
          tags: ${{ env.DEV_IMAGE }}

      # ── Build RELEASE image (tag: 1.0.0) ──
      - name: Checkout app repo (tag 1.0.0)
        if: ${{ github.event.inputs.environment == 'release' || github.event.inputs.environment == 'both' }}
        uses: actions/checkout@v4
        with:
          repository: YulianSalo/devops-exam-pt2
          ref: "1.0.0"
          path: app-release

      - name: Build & push RELEASE image
        if: ${{ github.event.inputs.environment == 'release' || github.event.inputs.environment == 'both' }}
        uses: docker/build-push-action@v5
        with:
          context: ./app-release
          push: true
          tags: ${{ env.RELEASE_IMAGE }}

      - name: Set outputs
        id: set-outputs
        run: |
          echo "dev_image=${{ env.DEV_IMAGE }}" >> $GITHUB_OUTPUT
          echo "release_image=${{ env.RELEASE_IMAGE }}" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # JOB 2: Dry-run validation (перевірка без розгортання)
  # ─────────────────────────────────────────────
  validate:
    name: Dry-run Validation
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Log in to Docker Hub (pull for validation)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Validate DEV image exists on registry
        if: ${{ github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'both' }}
        run: |
          echo "🔍 Validating DEV image: ${{ env.DEV_IMAGE }}"
          docker pull ${{ env.DEV_IMAGE }}
          echo "✅ DEV image validated successfully"

      - name: Validate RELEASE image exists on registry
        if: ${{ github.event.inputs.environment == 'release' || github.event.inputs.environment == 'both' }}
        run: |
          echo "🔍 Validating RELEASE image: ${{ env.RELEASE_IMAGE }}"
          docker pull ${{ env.RELEASE_IMAGE }}
          echo "✅ RELEASE image validated successfully"

      - name: Dry-run DEV container (start and health-check, no deploy)
        if: ${{ github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'both' }}
        run: |
          echo "🧪 Running dry-run for DEV environment..."
          docker run -d --name test-dev -p 8002:8000 ${{ env.DEV_IMAGE }} || \
          docker run -d --name test-dev -p 8002:8080 ${{ env.DEV_IMAGE }} || \
          docker run -d --name test-dev ${{ env.DEV_IMAGE }}
          sleep 5
          docker ps | grep test-dev
          echo "✅ DEV dry-run passed"
          docker stop test-dev && docker rm test-dev

      - name: Dry-run RELEASE container (start and health-check, no deploy)
        if: ${{ github.event.inputs.environment == 'release' || github.event.inputs.environment == 'both' }}
        run: |
          echo "🧪 Running dry-run for RELEASE environment..."
          docker run -d --name test-release -p 8003:8000 ${{ env.RELEASE_IMAGE }} || \
          docker run -d --name test-release -p 8003:8080 ${{ env.RELEASE_IMAGE }} || \
          docker run -d --name test-release ${{ env.RELEASE_IMAGE }}
          sleep 5
          docker ps | grep test-release
          echo "✅ RELEASE dry-run passed"
          docker stop test-release && docker rm test-release

  # ─────────────────────────────────────────────
  # JOB 3: Deploy to Droplet
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to DigitalOcean Droplet
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/exam_key
          chmod 600 ~/.ssh/exam_key
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      - name: Deploy DEV environment (port 8002)
        if: ${{ github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'both' }}
        run: |
          ssh -i ~/.ssh/exam_key root@${{ secrets.DROPLET_IP }} << 'ENDSSH'
            echo "🚀 Deploying DEV environment..."

            # Login to Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Stop and remove existing dev container if running
            docker stop app-dev 2>/dev/null || true
            docker rm app-dev 2>/dev/null || true

            # Pull latest image
            docker pull ${{ env.DEV_IMAGE }}

            # Run new container
            # Detect exposed port from image
            APP_PORT=$(docker inspect --format='{{range $p, $conf := .Config.ExposedPorts}}{{$p}}{{end}}' ${{ env.DEV_IMAGE }} | grep -oP '^\d+' | head -1)
            APP_PORT=${APP_PORT:-8000}

            docker run -d \
              --name app-dev \
              --restart unless-stopped \
              -p 8002:${APP_PORT} \
              ${{ env.DEV_IMAGE }}

            sleep 5
            docker ps | grep app-dev
            echo "✅ DEV deployed on port 8002"
          ENDSSH

      - name: Deploy RELEASE environment (port 8003)
        if: ${{ github.event.inputs.environment == 'release' || github.event.inputs.environment == 'both' }}
        run: |
          ssh -i ~/.ssh/exam_key root@${{ secrets.DROPLET_IP }} << 'ENDSSH'
            echo "🚀 Deploying RELEASE environment..."

            # Login to Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Stop and remove existing release container if running
            docker stop app-release 2>/dev/null || true
            docker rm app-release 2>/dev/null || true

            # Pull latest image
            docker pull ${{ env.RELEASE_IMAGE }}

            # Run new container
            APP_PORT=$(docker inspect --format='{{range $p, $conf := .Config.ExposedPorts}}{{$p}}{{end}}' ${{ env.RELEASE_IMAGE }} | grep -oP '^\d+' | head -1)
            APP_PORT=${APP_PORT:-8000}

            docker run -d \
              --name app-release \
              --restart unless-stopped \
              -p 8003:${APP_PORT} \
              ${{ env.RELEASE_IMAGE }}

            sleep 5
            docker ps | grep app-release
            echo "✅ RELEASE deployed on port 8003"
          ENDSSH

      - name: Verify deployments
        run: |
          ssh -i ~/.ssh/exam_key root@${{ secrets.DROPLET_IP }} << 'ENDSSH'
            echo "=== Running containers ==="
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Ports}}\t{{.Status}}"
            echo ""
            echo "🌐 DEV:     http://${{ secrets.DROPLET_IP }}:8002"
            echo "🌐 RELEASE: http://${{ secrets.DROPLET_IP }}:8003"
          ENDSSH

  # ─────────────────────────────────────────────
  # JOB 4: Rollback (додаткові бали)
  # ─────────────────────────────────────────────
  rollback:
    name: Rollback (if deploy failed)
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/exam_key
          chmod 600 ~/.ssh/exam_key
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      - name: Rollback to previous containers
        run: |
          ssh -i ~/.ssh/exam_key root@${{ secrets.DROPLET_IP }} << 'ENDSSH'
            echo "⚠️  Deployment failed! Rolling back..."

            # Rollback DEV
            if docker image ls ${{ secrets.DOCKER_USERNAME }}/devops-exam-app | grep -q "develop-prev"; then
              docker stop app-dev 2>/dev/null || true
              docker rm app-dev 2>/dev/null || true
              docker run -d --name app-dev --restart unless-stopped \
                -p 8002:8000 \
                ${{ secrets.DOCKER_USERNAME }}/devops-exam-app:develop-prev
              echo "✅ DEV rolled back to previous version"
            else
              echo "No previous DEV image found"
            fi

            # Rollback RELEASE
            if docker image ls ${{ secrets.DOCKER_USERNAME }}/devops-exam-app | grep -q "1.0.0-prev"; then
              docker stop app-release 2>/dev/null || true
              docker rm app-release 2>/dev/null || true
              docker run -d --name app-release --restart unless-stopped \
                -p 8003:8000 \
                ${{ secrets.DOCKER_USERNAME }}/devops-exam-app:1.0.0-prev
              echo "✅ RELEASE rolled back to previous version"
            else
              echo "No previous RELEASE image found"
            fi
          ENDSSH
